services:
  postgres-db:
    image: postgres:18-alpine
    container_name: dentplus-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # ports:
    #   - "5432:5432"
    volumes:
      - ./data/postgresql:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migration-runner:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: dentplus-migrations
    env_file:
      - .env
    command: >
      sh -c "pnpm prisma migrate deploy && pnpm prisma db seed"
    depends_on:
      postgres-db:
        condition: service_healthy    

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dentplus-app
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=${PORT}  
    ports:
    - "${PORT}:${PORT}"
    depends_on:
      postgres-db:
        condition: service_healthy